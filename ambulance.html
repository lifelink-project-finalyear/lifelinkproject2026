<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>LifeLink - Ambulance Live Sender</title>
  <style>
    :root {
      --bg: #f6f8fb;
      --panel: #ffffff;
      --text: #132238;
      --muted: #5e6b7a;
      --accent: #c81e1e;
      --danger: #8b1a1a;
      --ok: #117733;
    }

    body {
      margin: 0;
      font-family: "Segoe UI", Tahoma, sans-serif;
      background: radial-gradient(circle at top left, #ffecec, var(--bg) 55%);
      color: var(--text);
    }

    header {
      padding: 14px 18px;
      font-weight: 700;
      background: var(--panel);
      border-bottom: 1px solid #d8e1ec;
    }

    main {
      padding: 16px;
      max-width: 640px;
      margin: 0 auto;
    }

    .card {
      background: var(--panel);
      border: 1px solid #d8e1ec;
      border-radius: 10px;
      padding: 16px;
    }

    label {
      display: block;
      font-size: 12px;
      color: var(--muted);
      margin: 10px 0 6px;
    }

    input {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #d8e1ec;
      border-radius: 8px;
      font-size: 14px;
      box-sizing: border-box;
    }

    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .actions {
      display: flex;
      gap: 10px;
      margin-top: 16px;
    }

    button {
      border: 0;
      border-radius: 8px;
      padding: 10px 14px;
      font-weight: 700;
      cursor: pointer;
    }

    #startBtn { background: var(--accent); color: #fff; }
    #stopBtn { background: #eef2f7; color: var(--text); }

    #status {
      margin-top: 12px;
      font-size: 14px;
      color: var(--muted);
    }

    .ok { color: var(--ok); }
    .err { color: var(--danger); }
  </style>
</head>
<body>
  <header>LifeLink - Ambulance Live Sender</header>
  <main>
    <div class="card">
      <div class="row">
        <div>
          <label for="caseId">Case ID</label>
          <input id="caseId" placeholder="CASE-001" />
        </div>
        <div>
          <label for="patientId">Patient ID</label>
          <input id="patientId" placeholder="PAT-123" />
        </div>
      </div>
      <label for="diseaseType">Disease Type</label>
      <input id="diseaseType" placeholder="e.g., Influenza" />

      <div class="actions">
        <button id="startBtn">Start Sharing</button>
        <button id="stopBtn" disabled>Stop Sharing</button>
      </div>

      <div id="status">Idle</div>
    </div>
  </main>

  <script>
    const caseIdEl = document.getElementById("caseId");
    const patientIdEl = document.getElementById("patientId");
    const diseaseTypeEl = document.getElementById("diseaseType");
    const statusEl = document.getElementById("status");
    const startBtn = document.getElementById("startBtn");
    const stopBtn = document.getElementById("stopBtn");

    let watchId = null;
    let sending = false;

    function setStatus(text, cls) {
      statusEl.textContent = text;
      statusEl.className = cls || "";
    }

    async function sendLocation(lat, lng) {
      if (sending) return;
      sending = true;

      const payload = {
        caseId: (caseIdEl.value || "").trim(),
        patientId: (patientIdEl.value || "").trim(),
        diseaseType: (diseaseTypeEl.value || "").trim(),
        source: "ambulance",
        lat,
        lng,
        timestamp: Date.now()
      };

      if (!payload.caseId) {
        setStatus("Case ID is required.", "err");
        sending = false;
        return;
      }

      try {
        const res = await fetch("/location/update", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload)
        });
        const data = await res.json();
        if (!data.ok) throw new Error(data.message || "Server error");
        setStatus(`Sent: ${lat.toFixed(5)}, ${lng.toFixed(5)} at ${new Date().toLocaleTimeString()}`, "ok");
      } catch (err) {
        setStatus(`Send failed: ${err.message}`, "err");
      } finally {
        sending = false;
      }
    }

    function startSharing() {
      if (!navigator.geolocation) {
        setStatus("Geolocation not supported in this browser.", "err");
        return;
      }

      if (watchId !== null) return;

      watchId = navigator.geolocation.watchPosition(
        (pos) => {
          sendLocation(pos.coords.latitude, pos.coords.longitude);
        },
        (err) => {
          setStatus(`Location error: ${err.message}`, "err");
        },
        {
          enableHighAccuracy: true,
          maximumAge: 5000,
          timeout: 15000
        }
      );

      startBtn.disabled = true;
      stopBtn.disabled = false;
      setStatus("Sharing started. Waiting for location...", "ok");
    }

    function stopSharing() {
      if (watchId !== null) {
        navigator.geolocation.clearWatch(watchId);
        watchId = null;
      }
      startBtn.disabled = false;
      stopBtn.disabled = true;
      setStatus("Sharing stopped.", "");
    }

    startBtn.addEventListener("click", startSharing);
    stopBtn.addEventListener("click", stopSharing);
  </script>
</body>
</html>
