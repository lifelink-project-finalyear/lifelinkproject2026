<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Life Link | Register</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="site-header">
    <div class="left">
      <span class="logo-emoji">🚑</span>
      <span class="brand">Life Link</span>
    </div>
    <nav class="nav">
      <a href="index.html">Home</a>
      <a href="login.html" class="btn-out">Login</a>
    </nav>
  </header>

  <div class="auth-page">
    <div class="auth-left">
      <h1>🚑 Life Link</h1>
      <p>AI Powered Specific Disease<br>Ambulance Dispatch System</p>
    </div>

    <div class="auth-card">
      <h2>Create Account</h2>
      <form id="registerForm">
        <input type="text" name="fullname" placeholder="Full Name" required>
        <input type="email" name="email" placeholder="Email" required>
        <input type="tel" name="phone" placeholder="Phone Number" required>
        <input type="password" name="password" placeholder="Password" required>
        <select name="role" required>
          <option value="">Select Role</option>
          <option value="Patient">Patient</option>
          <option value="Doctor">Doctor</option>
          <option value="Ambulance Driver">Ambulance Driver</option>
        </select>
        <button type="submit" class="btn-primary">Register</button>
      </form>
      <p class="small">Already have an account? <a href="login.html">Login</a></p>
    </div>
  </div>

  <!-- Floating Emergency Call Button -->
  <button class="emergency-btn" onclick="window.location.href='tel:+91 7219474289'">
    🚑 Emergency Call
  </button>
<script>
  document.getElementById('registerForm').addEventListener('submit', async (e) => {
    e.preventDefault();

    const formData = new FormData(e.target);
    const data = Object.fromEntries(formData);

    if (data.password.length < 8) {
      alert('Password must be at least 8 characters.');
      return;
    }

    try {
      const response = await fetch('/register', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data)
      });

      const result = await response.json();

      if (response.ok) {
        alert(result.message);
        window.location.href = 'login.html';
      } else {
        alert(result.error);
      }
    } catch (error) {
      alert('Registration failed. Try again.');
      console.error(error);
    }
  });
</script>

  
</body>
</html>
